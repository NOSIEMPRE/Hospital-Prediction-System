version: "3.9"

services:
  # ── PostgreSQL for MLflow backend store ────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow_db"]
      interval: 5s
      retries: 5

  # ── MLflow Tracking Server ─────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    command: >
      mlflow server
      --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow_db
      --host 0.0.0.0
      --port 5001
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy

  # ── FastAPI ML API ─────────────────────────────────────────────────────────
  ml-api:
    build:
      context: ./06-cicd
      dockerfile: Dockerfile
    ports:
      - "9696:9696"
    environment:
      PORT: "9696"
      DISABLE_SHAP: "false"
      MLFLOW_TRACKING_URI: "http://mlflow:5001"
    depends_on:
      - mlflow

  # ── React + Express Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./06-cicd/frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      ML_API_URL: http://ml-api:9696
      NODE_ENV: production
      PORT: "3001"
    depends_on:
      - ml-api

volumes:
  pgdata:
